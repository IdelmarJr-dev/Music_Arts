spring.application.name=arts
# URL de conexão em memória (o nome 'screensound_db' fica na memória enquanto a app rodar)
spring.datasource.url=jdbc:h2:mem:music_arts_db

# Usuário e senha padrão do H2 (geralmente vazios, mas você pode definir)
spring.datasource.username=arts
spring.datasource.password=h2

# Driver do H2
spring.datasource.driver-class-name=org.h2.Driver

# Dialeto correto para H2 (corrigi do seu exemplo anterior)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Permite que o Hibernate crie as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Opcional: Habilita o console visual do H2 para ver seus dados no navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Para acessar utilize esse link no navegador
#    http://localhost:8080/h2-console